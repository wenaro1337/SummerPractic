<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Продуктовый магазин{% endblock %}</title>
    <style>
        body {
            font-family: Tahoma, Verdana, sans-serif;
            font-size: 14px;
            background: #e9e9e9;
            color: #000;
            margin: 0;
            padding: 20px 0;
        }

        /* всё содержимое по центру страницы */
        .wrap {
            width: 1360px;
            max-width: calc(100% - 32px);
            margin: 0 auto;
        }

        h2 { font-size: 18px; margin: 0 0 12px 0; }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px 16px;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #aaa;
            background: #f7f7f7;
        }
        .toolbar-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
        }
        .filter-form { flex: 1 1 650px; }
        .filter-form .search-field { flex: 1 1 280px; width: auto; }
        .database-form { margin: 0; }
        .database-label { font-weight: bold; margin-right: 2px; }

        .btn {
            font-family: Tahoma, Verdana, sans-serif;
            font-size: 13px;
            padding: 5px 10px;
            border: 1px solid #888;
            background: #dcdcdc;
            color: #000;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background: #cfcfcf; }
        .btn-primary { background: #cddfcd; border-color: #6f8d6f; }
        .btn-del { border-color: #a00; color: #a00; }

        details.help { position: relative; }
        details.help summary { list-style: none; }
        details.help summary::-webkit-details-marker { display: none; }
        .help-box {
            position: absolute;
            right: 0;
            z-index: 5;
            width: 330px;
            margin-top: 5px;
            padding: 10px 12px;
            border: 1px solid #888;
            background: #fff;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.18);
            line-height: 1.45;
        }
        .help-box ul { margin: 0; padding-left: 19px; }
        .help-box li + li { margin-top: 4px; }

        /* таблицу растягиваем по ширине, на маленьком экране будет прокрутка */
        .table-box {
            max-height: 590px;
            overflow: auto;
            border: 1px solid #999;
            background: #fff;
        }

        .product-table { min-width: 1120px; table-layout: auto; }
        .product-table th:nth-child(1) { width: 70px; }
        .product-table th:nth-child(2) { width: 190px; }
        .product-table th:nth-child(3) { width: 145px; }
        .product-table th:nth-child(4),
        .product-table th:nth-child(5) { width: 115px; }
        .product-table th:nth-child(6),
        .product-table th:nth-child(7),
        .product-table th:nth-child(8) { width: 75px; }
        .product-table th:nth-child(9) { width: 90px; }
        .product-table th:nth-child(10) { width: 145px; }

        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #bbb;
            padding: 4px 6px;
            font-size: 13px;
            text-align: left;
            vertical-align: top;
            overflow-wrap: break-word;
        }
        th {
            background: #cdd7cd;
            position: sticky;   /* шапка таблицы не уезжает при прокрутке */
            top: 0;
        }
        /* кнопки внутри таблицы делаем компактнее, чтобы всё влезало */
        td .btn { padding: 2px 6px; font-size: 12px; }
        .expired { color: #a00; }
        .empty { text-align: center; color: #555; padding: 15px; }

        h3 { font-size: 15px; margin: 18px 0 6px 0; }

        /* картинки графиков */
        .chart { margin: 10px 0 18px 0; }
        .chart img {
            max-width: 100%;
            border: 1px solid #999;
            background: #fff;
        }

        /* форма добавления / редактирования */
        .form-table td { border: none; padding: 4px 6px; }
        .field {
            font-family: Tahoma, Verdana, sans-serif;
            font-size: 14px;
            padding: 3px 5px;
            border: 1px solid #888;
            width: 240px;
        }
        .errorlist { color: #a00; margin: 2px 0; padding-left: 18px; font-size: 12px; }

        .messages { margin: 0 0 12px 0; padding: 0; list-style: none; }
        .messages li {
            border: 1px solid #6a6;
            background: #dff0df;
            padding: 6px 10px;
            margin-bottom: 6px;
        }
        .messages li.error {
            border-color: #c33;
            background: #f7dada;
            color: #a00;
        }

        @media (max-width: 760px) {
            body { padding-top: 10px; }
            .toolbar { align-items: stretch; }
            .toolbar-group { width: 100%; }
            .filter-form .field, .filter-form .btn { flex: 1 1 auto; }
            .database-form input[type="file"] { max-width: 100%; }
            .help-box { position: fixed; left: 16px; right: 16px; width: auto; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
